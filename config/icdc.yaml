project: ICDC
entity_source: ICDC
sources:
  - name: IDC
    type: rest
    api_base_url: https://api.imaging.datacommons.cancer.gov/v2
    dataset_base_url: https://portal.imaging.datacommons.cancer.gov/explore/filters/?collection_id={collection_id}
    dataset_base_url_param: collection_id
    endpoint: /collections
    response_data_key: collections
    match_key: collection_id
    filter_prefix: ccdi_
    post_processor: clean_idc_metadata
    entity_id_key: clinical_study_designation
  - name: TCIA
    type: rest
    api_base_url: https://services.cancerimagingarchive.net/services/v4
    dataset_base_url: https://nbia.cancerimagingarchive.net/nbia-search/?MinNumberOfStudiesCriteria=1&CollectionCriteria={collection_id}
    dataset_base_url_param: collection_id
    discovery:
      endpoint: /TCIA/query/getCollectionValues
      match_key: Collection
      filter_prefix: CCDI-
    fetch:
      endpoint_template: /TCIA/query/getSeries?Collection={collection_id}
      key_param: collection_id
    post_processor: aggregate_tcia_series_data
    entity_id_key: clinical_study_designation
  - name: ICDC
    type: static
    entity_id_key: clinical_study_designation
    data:
      - clinical_study_designation: "TARGET_ALL_P1"
      - clinical_study_designation: "TARGET_CCSK"
      - clinical_study_designation: "TARGET_ALL_P2_P3"
      - clinical_study_designation: "TARGET_OS"
      - clinical_study_designation: "TARGET_AML"
      - clinical_study_designation: "TARGET_MDLS"
      - clinical_study_designation: "TARGET_NBL"
      - clinical_study_designation: "TARGET_RT"
      - clinical_study_designation: "TARGET_WT"
      - clinical_study_designation: "CCDI_NIH_phs000720"
      - clinical_study_designation: "KF-ESGR"
      - clinical_study_designation: "CCSS_SMN"
      - clinical_study_designation: "PPTC"
      - clinical_study_designation: "KF-OS"
      - clinical_study_designation: "KF-FALL"
      - clinical_study_designation: "KF-GNINT"
      - clinical_study_designation: "KF-NCSF"
      - clinical_study_designation: "KF-MMC"
      - clinical_study_designation: "GMKF_T-ALL"
      - clinical_study_designation: "KF-IGCT"
      - clinical_study_designation: "CCDI"
      - clinical_study_designation: "CCDI_UCSF_phs002430"
      - clinical_study_designation: "HTAN_phs002371"
      - clinical_study_designation: "CCDI_UCSF_phs002504"
