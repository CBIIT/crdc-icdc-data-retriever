output:
  destination: opensearch
  config:
    host: https://vpc-ccdi-dev-hub-opensearch-bzgr6b4fqf4qdmgugczgdigcvm.us-east-1.es.amazonaws.com
    index: supportingdata
    # username: ${OPENSEARCH_USERNAME:-}
    # password: ${OPENSEARCH_PASSWORD:-}
    use_ssl: false
    verify_certs: false
notifications:
  destination: sns
  config:
    topic_arn: ${SNS_TOPIC_ARN}
    region: ${SNS_REGION:-us-east-1}
